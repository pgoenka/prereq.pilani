<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>prereq.pilani | Technical Cartographer</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23B7C4FF'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#121315",
                        "surface-container-lowest": "#0d0e10",
                        "surface-container-low": "#1b1c1e",
                        "surface-container": "#1f2022",
                        "surface-container-high": "#292a2c",
                        "surface-variant": "#343537",
                        "primary": "#b7c4ff",
                        "primary-container": "#2e62ff",
                        "on-surface": "#e3e2e5",
                        "on-surface-variant": "#c3c5d8",
                        "outline": "#8d90a2",
                        "outline-variant": "#434656",
                        "secondary-container": "#c68315",
                        "background": "#121315"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-background text-on-surface overflow-hidden h-screen flex flex-col selection:bg-primary/30">

    <div id="splashScreen" class="fixed inset-0 z-[100] bg-background flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="absolute inset-0 pointer-events-none overflow-hidden -z-10">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 rounded-full bg-primary/10 blur-[100px]"></div>
        </div>
        <span class="material-symbols-outlined text-primary text-6xl mb-6 pulse-slow">map</span>
        <h1 class="text-3xl md:text-4xl font-extrabold text-[#B7C4FF] tracking-tight pulse-slow">prereq<span class="text-primary-container">.pilani</span></h1>
        <div class="mt-4 flex flex-col items-center gap-1 opacity-60">
            <p class="text-xs font-bold tracking-[0.2em] uppercase text-outline-variant">by Pratyush Goenka</p>
        </div>
    </div>

    <header id="mainHeader" class="bg-[#121315] border-b border-[#434656]/20 fixed top-0 z-50 h-16 w-full flex justify-between items-center px-4 md:px-6 transition-all duration-300 hidden">
        <div class="flex items-center gap-2 z-10 cursor-pointer group" onclick="resetView()">
            <span class="material-symbols-outlined text-[#B7C4FF] group-hover:text-primary-container transition-colors">map</span>
            <span class="text-lg font-bold text-[#B7C4FF] tracking-tight group-hover:text-primary-container transition-colors hidden sm:block">prereq.pilani</span>
        </div>
        
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300 z-0" id="headerSearchContainer">
            <div class="relative flex flex-col items-center pointer-events-auto w-full max-w-[170px] sm:max-w-md">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-on-surface-variant text-sm">search</span>
                <input id="navSearchInput" class="bg-surface-container-low border border-outline-variant/20 rounded-lg pl-9 pr-3 py-2 w-full text-sm focus:outline-none focus:ring-1 focus:ring-primary/50 text-on-surface transition-all" placeholder="Search..." type="text" oninput="handleAutocomplete(this.value, 'navDropdown')" autocomplete="off"/>
                <div id="navDropdown" class="absolute top-12 left-0 w-full glass-panel border border-outline-variant/20 rounded-lg shadow-2xl hidden flex-col max-h-60 overflow-y-auto z-50"></div>
            </div>
        </div>
        <span class="text-[10px] sm:text-xs uppercase tracking-widest text-[#C3C5D8] font-medium opacity-70 z-10 text-right">by Pratyush <BR>Goenka</span>
    </header>

    <main id="landingView" class="flex flex-col items-center justify-center px-4 min-h-screen relative z-10 transition-opacity duration-500">
        <div class="absolute inset-0 pointer-events-none overflow-hidden -z-10">
            <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
        </div>
        
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-[#B7C4FF] tracking-tight mb-2 leading-tight">
                prereq<span class="text-primary-container">.pilani</span>
            </h1>
            <p class="text-xs font-bold tracking-[0.2em] uppercase text-outline-variant mb-6">by Pratyush Goenka</p>
            <p class="text-on-surface-variant text-sm sm:text-base max-w-[280px] mx-auto leading-relaxed">
                The technical cartographer for BITS Pilani course prerequisites.
            </p>
        </div>
        
        <div class="w-full max-w-xl relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-primary/20 to-primary-container/20 rounded-xl blur opacity-30 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
            <div class="relative flex flex-col bg-surface-container-low border border-outline-variant/20 rounded-xl shadow-2xl">
                <div class="flex items-center px-5 py-4">
                    <span class="material-symbols-outlined text-outline mr-3">search</span>
                    <input id="mainSearchInput" class="bg-transparent border-none focus:ring-0 outline-none text-on-surface placeholder:text-outline w-full text-base sm:text-lg font-medium" placeholder="Search course (e.g., CS F111)" type="text" oninput="handleAutocomplete(this.value, 'mainDropdown')" autocomplete="off"/>
                </div>
                <div id="mainDropdown" class="w-full bg-surface-container border-t border-outline-variant/20 rounded-b-xl hidden flex-col max-h-60 overflow-y-auto"></div>
            </div>
        </div>
    </main>

    <main id="graphView" class="hidden flex-1 relative graph-bg overflow-hidden pt-16">
        
        <div id="zoomContainer" class="absolute w-full h-full">
            <svg id="svgCanvas" class="absolute overflow-visible pointer-events-none z-0" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <marker id="arrowhead" markerheight="6" markerwidth="8" orient="auto" refx="8" refy="3">
                        <polygon fill="#434656" opacity="0.8" points="0 0, 8 3, 0 6"></polygon>
                    </marker>
                    <marker id="arrowhead-co" markerheight="6" markerwidth="8" orient="auto" refx="8" refy="3">
                        <polygon fill="#c68315" opacity="0.8" points="0 0, 8 3, 0 6"></polygon>
                    </marker>
                </defs>
                <g id="linesGroup"></g>
            </svg>
            <div id="nodesContainer" class="absolute w-full h-full z-10"></div>
        </div>

        <div class="absolute bottom-6 right-6 flex flex-col gap-2 z-50">
            <button onclick="zoomIn()" class="w-10 h-10 rounded-full glass-panel border border-outline-variant/30 flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors shadow-lg">
                <span class="material-symbols-outlined text-xl">add</span>
            </button>
            <button onclick="zoomOut()" class="w-10 h-10 rounded-full glass-panel border border-outline-variant/30 flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors shadow-lg">
                <span class="material-symbols-outlined text-xl">remove</span>
            </button>
            <button onclick="resetZoom()" class="w-10 h-10 rounded-full glass-panel border border-outline-variant/30 flex items-center justify-center text-on-surface hover:bg-surface-variant transition-colors shadow-lg">
                <span class="material-symbols-outlined text-lg">filter_center_focus</span>
            </button>
        </div>
        
    </main>

    <script src="app.js"></script>
</body>
</html>
